<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="calculator">
      <input id="display" readonly />
      <div id="imageOverlay" style="display: none;">
  <img id="secretImage" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSFWwfLDRT_8GOFrJ18N3cV-pfbz4zdfdCUk6L4bRNv9w&s=10">
  <img id="secretImage" src="">
  <img id="secretImage" src="">
  <img id="secretImage" src="">
  <img id="secretImage" src="">
  <img id="secretImage" src="">
  <img id="secretImage" src="">
  <button onclick="closeImage()">Close</button>
</div>
      
      <div id="keys">
        <button onclick="appendToDisplay('&#40')" class="operator">&#40</button>
        <button onclick="appendToDisplay('&#41')"class="operator">&#41</button>
        <button onclick="appendToDisplay('%')" class="operator">%</button>
        <button onclick="clearDisplay('C')" class="operator">C</button>
        <button onclick="appendToDisplay('/')" class="operator">/</button>
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button onclick="appendToDisplay('*')" class="operator">*</button>
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('-')" class="operator">-</button>
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="appendToDisplay('+')" class="operator">+</button>
        <button onclick="appendToDisplay('0')">0</button>
        <button onclick="appendToDisplay('.')">.</button>
        <button onclick="calculate('=')" class="operator">=</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
